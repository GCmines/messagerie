<!-- static/chat.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/static/styles.css">
  <title>Mini WhatsApp - Chat</title>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="dot"></span>Mounier & Chupin vous présentent leur messagerie</div>
  </div>

  <div class="app">
    <aside class="panel lobby">
      <h2 class="center">Rooms</h2>

      <div class="box">
        <h3>Rooms auxquelles vous êtes abonné</h3>
        <ul id="roomsList"></ul>
        <button id="refreshRoomsBtn">Refresh</button>
        <div id="noRoomsMsg" class="small hidden" style="margin-top:8px;">Vous n'êtes abonné à aucune room. Retournez au lobby pour vous abonner.</div>
      </div>

      <div class="box">
        <h3>Utilisateur</h3>
        <div class="small">User: <strong id="currentUser">—</strong></div>
        <div style="margin-top:8px;">
          <button id="leaveBtn">Leave</button>
        </div>
      </div>

      <div class="credit">messagerie de Mounier & Chupin</div>
    </aside>

    <main class="panel chat">
      <div class="header">
        <div>
          <div class="title" id="roomTitle">—</div>
          <div class="sub" id="roomSub">—</div>
        </div>
        <div class="small">Petit style Matrix :)</div>
      </div>

      <div id="messages"></div>

      <div class="composer">
        <input id="content" type="text" placeholder="Tapez votre message..." />
        <button id="sendBtn">Send</button>
      </div>
    </main>
  </div>

<script>
/* utilities */
function qs(name){
  const params = new URLSearchParams(location.search);
  return params.get(name);
}
function el(id){ return document.getElementById(id); }

/* state */
let user = qs('user');
const room = qs('room');
const messagesEl = el('messages');
const currentUserEl = el('currentUser');
const roomTitleEl = el('roomTitle');
const roomSubEl = el('roomSub');
const noRoomsMsg = el('noRoomsMsg');
let ws = null;

/* header */
function setHeader(u, r){
  currentUserEl.textContent = u || '—';
  roomTitleEl.textContent = r || '—';
  roomSubEl.textContent = u ? `Connected as ${u}` : 'Not connected';
}

/* build DOM node for a message (supports pending marker) */
function buildMessageNode(m){
  const wrapper = document.createElement('div');
  wrapper.className = 'msg ' + (m.user_name === user ? 'me' : 'other');
  if (m.__pending) wrapper.classList.add('pending');
  if (m.__pendingId) wrapper.dataset.pendingId = m.__pendingId;

  const meta = document.createElement('div');
  meta.className = 'meta';
  let displayTime = '';
  try {
    displayTime = new Date(m.created_at).toLocaleString('fr-FR', { timeZone: 'Europe/Paris' });
  } catch(e) {
    displayTime = m.created_at || '';
  }
  meta.textContent = `${m.user_name} • ${displayTime}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = m.content;

  wrapper.appendChild(meta);
  wrapper.appendChild(bubble);
  return wrapper;
}

/* appendMessage with deduplication: replace pending when server message arrives */
function appendMessage(m){
  const isPending = !!m.__pending;
  if (!isPending) {
    // try to find a matching pending message (same user + same content)
    const pendingNodes = Array.from(messagesEl.querySelectorAll('.msg.pending'));
    for (const node of pendingNodes) {
      const bubble = node.querySelector('.bubble');
      const meta = node.querySelector('.meta');
      if (!bubble || !meta) continue;
      const pendingContent = bubble.textContent;
      const pendingUser = meta.textContent.split(' • ')[0];
      if (pendingUser === m.user_name && pendingContent === m.content) {
        const newNode = buildMessageNode(m);
        node.replaceWith(newNode);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return;
      }
    }
  }
  const node = buildMessageNode(m);
  messagesEl.appendChild(node);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

/* load history from server */
async function loadHistory(){
  if (!room) return;
  try {
    const res = await fetch(`/rooms/${encodeURIComponent(room)}/messages`);
    if (!res.ok) return;
    const data = await res.json();
    messagesEl.innerHTML = '';
    (data || []).forEach(appendMessage);
  } catch(e){
    console.warn('loadHistory error', e);
  }
}

/* WebSocket connection */
function connectWS(chosenUser){
  user = chosenUser || user;
  setHeader(user, room);
  const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${protocol}://${location.host}/ws/${encodeURIComponent(user)}/${encodeURIComponent(room)}`);

  ws.onopen = () => console.log('ws open');
  ws.onmessage = (ev) => {
    try {
      const payload = JSON.parse(ev.data);
      if (payload.error) {
        alert('WebSocket error: ' + payload.error);
        return;
      }
      if (payload.info) {
        console.log(payload.info);
        return;
      }
      appendMessage(payload);
    } catch(e){
      console.log('raw ws', ev.data);
    }
  };
  ws.onclose = () => console.log('ws closed');
  ws.onerror = (e) => console.error('ws error', e);
}

/* send with pending echo and deduplication */
function send(){
  const input = el('content');
  const text = input.value.trim();
  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    alert('WebSocket non connecté');
    return;
  }

  // create a local pending message
  const pendingMsg = {
    id: null,
    user_name: user,
    room_name: room,
    content: text,
    created_at: new Date().toISOString(),
    __pending: true,
    __pendingId: 'p_' + Date.now().toString(36) + '_' + Math.floor(Math.random()*10000).toString(36)
  };
  appendMessage(pendingMsg);

  // send to server
  try {
    ws.send(JSON.stringify({ content: text }));
  } catch (e) {
    console.error('WS send error', e);
  }
  input.value = '';
}

/* leave room */
async function leave(){
  if (ws) ws.close();
  if (user) {
    try {
      await fetch('/leave', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ user_name: user, room_name: room })
      });
    } catch (e) {
      console.warn('leave error', e);
    }
  }
  window.location = '/static/index.html';
}

/* modal to choose username */
function showModalSelect(title, options){
  return new Promise(resolve => {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    const box = document.createElement('div');
    box.className = 'modal-box';
    const h = document.createElement('h3'); h.textContent = title;
    const select = document.createElement('select');
    select.style = 'width:100%;padding:8px;margin-top:8px;';
    options.forEach(opt => {
      const o = document.createElement('option'); o.value = opt; o.textContent = opt;
      select.appendChild(o);
    });
    const actions = document.createElement('div'); actions.className = 'modal-actions';
    const ok = document.createElement('button'); ok.textContent = 'Rejoindre'; ok.style='margin-right:8px;';
    const cancel = document.createElement('button'); cancel.textContent = 'Annuler';
    actions.appendChild(ok); actions.appendChild(cancel);
    box.appendChild(h); box.appendChild(select); box.appendChild(actions);
    backdrop.appendChild(box);
    document.body.appendChild(backdrop);

    ok.onclick = () => { const v = select.value; document.body.removeChild(backdrop); resolve(v); };
    cancel.onclick = () => { document.body.removeChild(backdrop); resolve(null); };
  });
}

/* fetch and display only rooms the user is subscribed to */
async function refreshRoomsForUser(){
  const ul = el('roomsList');
  ul.innerHTML = '';
  noRoomsMsg.classList.add('hidden');

  if (!user) {
    // if no user in query, prompt selection to know which subscriptions to show
    try {
      const res = await fetch('/available_usernames');
      if (!res.ok) throw new Error('failed to fetch usernames');
      const data = await res.json();
      const list = data.available_usernames || [];
      if (list.length === 0) {
        noRoomsMsg.textContent = 'Aucun username disponible. Retournez au lobby pour créer un utilisateur.';
        noRoomsMsg.classList.remove('hidden');
        return;
      }
      const choice = await showModalSelect('Choisissez un username pour voir vos rooms', list);
      if (!choice) {
        noRoomsMsg.textContent = 'Aucun utilisateur sélectionné.';
        noRoomsMsg.classList.remove('hidden');
        return;
      }
      // attempt to join/reserve username so we can fetch subscriptions safely
      const joinRes = await fetch('/join', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ user_name: choice, room_name: '' })
      }).catch(()=>null);
      // ignore join result if server expects a room; we only need the username
      user = choice;
      setHeader(user, room);
    } catch (e) {
      console.warn('failed to prompt username', e);
      noRoomsMsg.textContent = 'Impossible de récupérer les utilisateurs disponibles.';
      noRoomsMsg.classList.remove('hidden');
      return;
    }
  }

  // fetch subscriptions for this user
  try {
    const res = await fetch(`/subscriptions/${encodeURIComponent(user)}`);
    if (!res.ok) {
      // if 404, user not found
      noRoomsMsg.textContent = 'Utilisateur introuvable ou pas d\'abonnement.';
      noRoomsMsg.classList.remove('hidden');
      return;
    }
    const data = await res.json();
    const rooms = data.rooms || [];
    if (!rooms.length) {
      noRoomsMsg.textContent = 'Vous n\'êtes abonné à aucune room. Retournez au lobby pour vous abonner.';
      noRoomsMsg.classList.remove('hidden');
      return;
    }
    // populate list with only subscribed rooms
    rooms.forEach(rname => {
      const li = document.createElement('li');
      li.className = 'room-item';
      const name = document.createElement('div'); name.className = 'name'; name.textContent = rname;
      const meta = document.createElement('div'); meta.className = 'meta'; meta.textContent = '';
      li.appendChild(name);
      li.appendChild(meta);
      li.onclick = () => {
        if (!user) return alert('Sélectionnez d\'abord un username');
        if (rname === room) return;
        window.location = `/static/chat.html?user=${encodeURIComponent(user)}&room=${encodeURIComponent(rname)}`;
      };
      ul.appendChild(li);
    });
  } catch (e) {
    console.warn('refreshRoomsForUser error', e);
    noRoomsMsg.textContent = 'Erreur lors de la récupération des rooms.';
    noRoomsMsg.classList.remove('hidden');
  }
}

/* initialization flow */
async function init(){
  if (!room) {
    // no room in query: still show user's subscribed rooms in sidebar
    await refreshRoomsForUser();
    setHeader(user, room);
    return;
  }

  setHeader(user, room);

  if (!user) {
    // if user not provided, try to fetch available usernames and prompt selection
    try {
      const res = await fetch('/available_usernames');
      if (!res.ok) throw new Error('failed to fetch usernames');
      const data = await res.json();
      const list = data.available_usernames || [];
      if (list.length === 0) {
        alert('Aucun username disponible. Créez-en un via le lobby.');
        window.location = '/static/index.html';
        return;
      }
      const choice = await showModalSelect('Choisissez un username', list);
      if (!choice) {
        window.location = '/static/index.html';
        return;
      }
      const joinRes = await fetch('/join', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ user_name: choice, room_name: room })
      });
      if (joinRes.status === 409) {
        alert('Ce username a été pris entre-temps. Réessayez.');
        return init();
      }
      if (!joinRes.ok) {
        const err = await joinRes.json().catch(()=>({detail:'Erreur'}));
        alert('Erreur: ' + (err.detail || 'Impossible de rejoindre'));
        return;
      }
      connectWS(choice);
      await loadHistory();
    } catch (e) {
      console.error(e);
      alert('Erreur réseau ou serveur. Voir la console.');
      return;
    }
  } else {
    connectWS(user);
    await loadHistory();
  }

  // populate sidebar with subscribed rooms for this user
  await refreshRoomsForUser();
}

/* event wiring */
el('sendBtn').addEventListener('click', send);
el('content').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
el('leaveBtn').addEventListener('click', leave);
el('refreshRoomsBtn').addEventListener('click', refreshRoomsForUser);

/* start */
init();
</script>
</body>
</html>
