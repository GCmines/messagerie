<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/static/styles.css">
  <title>Mini WhatsApp - Lobby</title>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="dot"></span>Mounier & Chupin vous présentent leur messagerie</div>
  </div>

  <div class="app">
    <aside class="panel lobby">
      <h2 class="center">Lobby</h2>

      <div class="box">
        <h3>Create user</h3>
        <input id="userName" placeholder="username" />
        <button id="createUserBtn">Create</button>
        <div id="userResult" class="small"></div>
      </div>

      <div class="box">
        <h3>Create room</h3>
        <input id="roomName" placeholder="room name" />
        <button id="createRoomBtn">Create</button>
        <div id="roomResult" class="small"></div>
      </div>

      <div class="box">
        <h3>Available rooms</h3>
        <ul id="roomsList"></ul>
        <button id="refreshRoomsBtn">Refresh</button>
      </div>

      <div class="box">
        <h3>Join as user</h3>
        <div style="display:flex; align-items:center; gap:8px;">
          <select id="availableUsers" style="flex:1; min-width:200px"></select>
          <select id="joinRoom" style="min-width:160px"></select>
          <button id="enterRoomBtn">Enter room</button>
        </div>
        <div style="margin-top:8px;">
          <button id="subscribeBtn">Subscribe</button>
          <button id="unsubscribeBtn">Unsubscribe</button>
        </div>
        <div id="subResult" class="small" style="margin-top:8px;"></div>
      </div>

      <div class="credit">messagerie de Mounier & Chupin</div>
    </aside>

    <main class="panel chat">
      <div class="header">
        <div>
          <div class="title">Aperçu du chat</div>
          <div class="sub">Sélectionnez une room et un username pour ouvrir la conversation</div>
        </div>
      </div>

      <div id="messages" class="center small" style="display:flex;align-items:center;justify-content:center;">
        <div>Ouvrez une room pour voir les messages</div>
      </div>

      <div class="composer" style="justify-content:center">
        <input type="text" placeholder="Sélectionnez une room à gauche pour démarrer (pensez à vous inscrire :)  )" disabled />
        <button class="secondary">Envoyer</button>
      </div>
    </main>
  </div>

<script>

async function apiRaw(path, opts){
  const res = await fetch(path, opts);
  const text = await res.text();
  try { return JSON.parse(text); } catch(e) { return text; }
}
const api = (path, opts) => apiRaw(path, opts);


function debounce(fn, wait = 180) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), wait);
  };
}


let lastSelectedUsername = localStorage.getItem('lastSelectedUsername') || null;


function populateAvailable(sel, list) {
  const prev = lastSelectedUsername || sel.value || null;
  sel.innerHTML = '';
  if (!list || list.length === 0) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.innerText = '(no available usernames)';
    sel.appendChild(opt);
    sel.value = '';
    lastSelectedUsername = '';
    try { localStorage.setItem('lastSelectedUsername', ''); } catch(e){}
    return;
  }
  list.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u;
    opt.innerText = u;
    sel.appendChild(opt);
  });
  if (prev) {
    const exists = Array.from(sel.options).some(o => o.value === prev);
    if (exists) {
      sel.value = prev;
      lastSelectedUsername = prev;
    } else {
      sel.selectedIndex = 0;
      lastSelectedUsername = sel.value;
    }
  } else {
    sel.selectedIndex = 0;
    lastSelectedUsername = sel.value;
  }
  try { localStorage.setItem('lastSelectedUsername', lastSelectedUsername); } catch(e){}
}


const _refreshAvailableUsers = async function(keepSelection = true) {
  const sel = document.getElementById('availableUsers');
  if (!sel) return;
  if (keepSelection) {
    lastSelectedUsername = sel.value || localStorage.getItem('lastSelectedUsername') || null;
  } else {
    lastSelectedUsername = null;
  }
  try {
    const res = await fetch('/available_usernames');
    if (!res.ok) {
      const fallback = await fetch('/users');
      if (!fallback.ok) return;
      const users = await fallback.json();
      const list = (users || []).map(u => u.name || u);
      populateAvailable(sel, list);
      return;
    }
    const data = await res.json();
    const list = data.available_usernames || [];
    populateAvailable(sel, list);
  } catch (e) {
    console.warn('failed to fetch available usernames', e);
  }
};
const refreshAvailableUsers = debounce(_refreshAvailableUsers, 180);


async function refreshRooms(){
  try {
    const rooms = await api('/rooms');
    const ul = document.getElementById('roomsList');
    ul.innerHTML = '';
    const sel = document.getElementById('joinRoom');
    sel.innerHTML = '';
    (rooms || []).forEach(r => {
      const li = document.createElement('li');
      li.className = 'room-item';
      li.textContent = r.name;
      li.onclick = () => {
        const available = document.getElementById('availableUsers');
        const first = available && available.options && available.options.length ? available.options[0].value : '';
        if (first) {
          window.location = `/static/chat.html?user=${encodeURIComponent(first)}&room=${encodeURIComponent(r.name)}`;
        } else {
          alert('Choisissez un username disponible dans la liste puis cliquez Enter room.');
        }
      };
      ul.appendChild(li);
      const opt = document.createElement('option');
      opt.value = r.name;
      opt.innerText = r.name;
      sel.appendChild(opt);
    });
  } catch (e) {
    console.warn('refreshRooms error', e);
  }
}


async function createUser(){
  const name = document.getElementById('userName').value.trim();
  if(!name) return alert('enter name');
  const res = await api('/users', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name})});
  document.getElementById('userResult').innerText = JSON.stringify(res);
  await refreshRooms();
  await refreshAvailableUsers(true);
  document.getElementById('userName').value = '';
}
async function createRoom(){
  const name = document.getElementById('roomName').value.trim();
  if(!name) return alert('enter room name');
  const res = await api('/rooms', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name})});
  document.getElementById('roomResult').innerText = JSON.stringify(res);
  await refreshRooms();
  document.getElementById('roomName').value = '';
}

async function subscribe(){
  const user = document.getElementById('availableUsers').value;
  const room = document.getElementById('joinRoom').value;
  if(!user || !room) return alert('select a username and a room');
  lastSelectedUsername = user;
  try {
    const res = await fetch('/subscribe', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({user_name:user, room_name:room})
    });
    const data = await res.json().catch(()=>({}));
    document.getElementById('subResult').innerText = JSON.stringify(data);
  } catch(e) {
    console.warn('subscribe error', e);
  }
  refreshAvailableUsers(true);
}
async function unsubscribe(){
  const user = document.getElementById('availableUsers').value;
  const room = document.getElementById('joinRoom').value;
  if(!user || !room) return alert('select a username and a room');
  lastSelectedUsername = user;
  try {
    const res = await fetch('/unsubscribe', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({user_name:user, room_name:room})
    });
    const data = await res.json().catch(()=>({}));
    document.getElementById('subResult').innerText = JSON.stringify(data);
  } catch(e) {
    console.warn('unsubscribe error', e);
  }
  refreshAvailableUsers(true);
}

function goToChat(){
  const user = document.getElementById('availableUsers').value;
  const room = document.getElementById('joinRoom').value;
  if(!room) return alert('room required');
  if(!user) return alert('choose a username from the list');
  window.location = `/static/chat.html?user=${encodeURIComponent(user)}&room=${encodeURIComponent(room)}`;
}
async function initLobby(){
  document.getElementById('createUserBtn').addEventListener('click', createUser);
  document.getElementById('createRoomBtn').addEventListener('click', createRoom);
  document.getElementById('refreshRoomsBtn').addEventListener('click', refreshRooms);
  document.getElementById('enterRoomBtn').addEventListener('click', goToChat);
  document.getElementById('subscribeBtn').addEventListener('click', subscribe);
  document.getElementById('unsubscribeBtn').addEventListener('click', unsubscribe);

  await refreshRooms();
  await refreshAvailableUsers(true);
}

setInterval(() => refreshAvailableUsers(true), 10000);

initLobby();
</script>
</body>
</html>
